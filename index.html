<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Launch Monitor Emulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #10151c;
      --panel:     #141b24;
      --border:    #1e2d3d;
      --green:     #00e676;
      --green-dim: #00a152;
      --green-glow:#00e67633;
      --amber:     #ffc107;
      --red:       #ff3d3d;
      --blue:      #29b6f6;
      --text:      #f2f4f7;
      --text-dim:  #819aac;
      --mono:      'Share Tech Mono', monospace;
      --display:   'Orbitron', sans-serif;
      --ui:        'Rajdhani', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Grid noise overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,230,118,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,230,118,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-family: var(--display);
      font-size: 1.4rem;
      font-weight: 900;
      letter-spacing: .12em;
      color: var(--green);
      text-shadow: 0 0 18px var(--green-glow);
    }
    .logo span { color: var(--text-dim); font-weight: 400; font-size: .85rem; letter-spacing: .2em; display: block; margin-top: 2px; }

    .status-bar {
      display: flex; gap: 20px; align-items: center;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:.3; }
    }
    .status-label { font-family: var(--mono); font-size:.75rem; color: var(--text-dim); letter-spacing: .15em; }

    /* ── MAIN GRID ── */
    .main-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 16px;
    }

    /* ── PANEL BASE ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 18px;
    }
    .panel-title {
      font-family: var(--display);
      font-size: .6rem;
      letter-spacing: .25em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* ── CLUB SELECTOR ── */
    .club-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .club-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .15s ease;
      font-family: var(--ui);
      font-size: .95rem;
      font-weight: 500;
      color: var(--text-dim);
      background: transparent;
      width: 100%;
      text-align: left;
    }
    .club-item:hover {
      background: rgba(0,230,118,.06);
      color: var(--text);
      border-color: var(--border);
    }
    .club-item.active {
      background: rgba(0,230,118,.1);
      border-color: var(--green-dim);
      color: var(--green);
    }
    .club-item .club-loft {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--text-dim);
    }
    .club-item.active .club-loft { color: var(--green-dim); }

    .club-category {
      font-family: var(--mono);
      font-size: .62rem;
      letter-spacing: .2em;
      color: var(--text-dim);
      padding: 8px 4px 4px;
      text-transform: uppercase;
    }

    /* ── RIGHT COLUMN ── */
    .right-col { display: flex; flex-direction: column; gap: 16px; }

    /* ── SHOT TYPE BUTTONS ── */
    .shot-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .shot-btn {
      position: relative;
      padding: 14px 8px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-family: var(--ui);
      font-weight: 600;
      font-size: .85rem;
      letter-spacing: .05em;
      color: var(--text-dim);
      text-align: center;
      transition: all .2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .shot-btn .shot-icon { font-size: 1.4rem; line-height: 1; }
    .shot-btn .shot-hla {
      font-family: var(--mono);
      font-size: .62rem;
      color: var(--text-dim);
    }

    .shot-btn:hover { transform: translateY(-2px); }

    .shot-btn.straight  { --c: var(--green);  }
    .shot-btn.draw      { --c: var(--blue);   }
    .shot-btn.fade      { --c: var(--amber);  }
    .shot-btn.snap-hook { --c: #ff7043;       }
    .shot-btn.slice     { --c: var(--red);    }

    .shot-btn:hover, .shot-btn.firing {
      border-color: var(--c);
      color: var(--c);
      background: color-mix(in srgb, var(--c) 10%, var(--surface));
      box-shadow: 0 0 16px color-mix(in srgb, var(--c) 30%, transparent);
    }
    .shot-btn.firing {
      animation: fire .4s ease;
    }
    @keyframes fire {
      0%  { transform: scale(1); }
      30% { transform: scale(.95); }
      60% { transform: scale(1.04); }
      100%{ transform: scale(1); }
    }

    /* ── POWER METER ── */
    .power-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .power-label-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      width: 77px;
    }
    .power-pct {
      font-family: var(--display);
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
      color: var(--green);
      transition: color .2s;
    }
    .power-pct.mid  { color: var(--amber); }
    .power-pct.low  { color: var(--red);   }
    .power-sublabel {
      font-family: var(--mono);
      font-size: .58rem;
      letter-spacing: .15em;
      color: var(--text-dim);
    }
    .power-slider-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .power-track {
      position: relative;
      height: 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
    }
    .power-fill {
      position: absolute;
      inset: 0 auto 0 0;
      background: linear-gradient(90deg, var(--green-dim), var(--green));
      transition: width .05s linear, background .3s;
      border-radius: 3px 0 0 3px;
    }
    .power-fill.mid { background: linear-gradient(90deg, #e65100, var(--amber)); }
    .power-fill.low { background: linear-gradient(90deg, #b71c1c, var(--red)); }
    .power-ticks {
      position: absolute; inset: 0;
      display: flex; justify-content: space-between;
      pointer-events: none;
    }
    .power-tick { width: 1px; background: rgba(0,0,0,.35); height: 100%; }
    .power-tick:first-child, .power-tick:last-child { opacity: 0; }
    .power-notch-labels {
      display: flex; justify-content: space-between;
      font-family: var(--mono); font-size: .58rem;
      color: var(--text-dim); padding: 0 2px;
    }
    input[type=range].power-range {
      width: 100%; height: 36px; opacity: 0;
      position: absolute; inset: 0; cursor: pointer; margin: 0;
    }
    .power-presets { display: flex; gap: 6px; }
    .power-preset {
      flex: 1; padding: 5px 0;
      font-family: var(--mono); font-size: .65rem; letter-spacing: .1em;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text-dim);
      cursor: pointer; transition: all .15s; text-align: center;
    }
    .power-preset:hover, .power-preset.active {
      border-color: var(--green-dim); color: var(--green);
      background: rgba(0,230,118,.07);
    }

    /* ── DATA READOUT ── */
    .readout-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 14px 12px;
      position: relative;
      overflow: hidden;
    }
    .metric::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--green-dim);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .4s ease;
    }
    .metric.lit::after { transform: scaleX(1); }

    .metric-label {
      font-family: var(--mono);
      font-size: .6rem;
      letter-spacing: .18em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .metric-value {
      font-family: var(--display);
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      transition: all .3s ease;
    }
    .club-title {
      font-family: var(--display);
      font-size: .8rem;
      font-weight: 700;
      color: var(--green);
      line-height: 1;
      transition: all .3s ease;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .metric-value.updating {
      animation: tick .25s ease;
    }
    @keyframes tick {
      0%  { opacity:.2; transform: translateY(-4px); }
      100%{ opacity:1; transform: translateY(0); }
    }
    .metric-unit {
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .metric-value.warn { color: var(--amber); }
    .metric-value.danger { color: var(--red); }

    /* ── TRAJECTORY VISUALISER ── */
    .trajectory-wrap {
      position: relative;
    }
    #traj-canvas {
      width: 100%;
      height: 180px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      display: block;
    }
    .traj-label {
      position: absolute;
      top: 10px; left: 14px;
      font-family: var(--mono);
      font-size: .6rem;
      letter-spacing: .15em;
      color: var(--text-dim);
    }

    /* ── LOG ── */
    .log-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      height: 130px;
      overflow-y: auto;
      padding: 10px 14px;
      font-family: var(--mono);
      font-size: .72rem;
      line-height: 1.7;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .log-entry { color: var(--text-dim); }
    .log-entry .ts { color: var(--green-dim); margin-right: 8px; }
    .log-entry.ok .msg  { color: var(--green); }
    .log-entry.err .msg { color: var(--red); }
    .log-entry.send .msg{ color: var(--blue); }

    /* ── SERVER CONFIG ── */
    .config-row {
      display: flex; gap: 10px; align-items: center;
    }
    .config-row label {
      font-family: var(--mono);
      font-size: .7rem;
      color: var(--text-dim);
      white-space: nowrap;
    }
    .config-row input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: .78rem;
      outline: none;
      transition: border-color .2s;
    }
    .config-row input:focus { border-color: var(--green-dim); }

    /* ── CLUB PANEL TOGGLE (mobile) ── */
    .club-panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-family: var(--display);
      font-size: .6rem;
      letter-spacing: .25em;
      color: var(--text-dim);
      text-transform: uppercase;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      user-select: none;
      margin-bottom: 14px;
    }
    .club-toggle-btn {
      display: none;
      align-items: center;
      gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 4px 10px;
      font-family: var(--mono);
      font-size: .62rem;
      letter-spacing: .12em;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .15s;
    }
    .club-toggle-btn:hover {
      border-color: var(--green-dim);
      color: var(--green);
    }
    .club-toggle-arrow {
      display: inline-block;
      transition: transform .25s ease;
      font-size: .8rem;
      line-height: 1;
    }
    .club-toggle-btn.open .club-toggle-arrow {
      transform: rotate(180deg);
    }
    .club-selected-summary {
      display: none;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: .72rem;
      margin-bottom: 0;
    }
    .club-selected-summary .csname { color: var(--green); }
    .club-selected-summary .csdist { color: var(--text-dim); }
    .club-list-wrap {
      overflow: hidden;
      transition: max-height .3s ease, opacity .25s ease;
      max-height: 2000px;
      opacity: 1;
    }
    .club-list-wrap.collapsed {
      max-height: 0;
      opacity: 0;
    }
 
    /* ── RESPONSIVE ── */
    @media (max-width: 780px) {
      .main-grid { grid-template-columns: 1fr; }
      .shot-grid  { grid-template-columns: repeat(3,1fr); }
      .readout-grid { grid-template-columns: repeat(3,1fr); }
 
      .club-panel-title { cursor: pointer; }
      .club-toggle-btn  { display: flex; }
      .club-selected-summary { display: flex; }
 
      .club-panel-title.is-open {
        margin-bottom: 14px;
        border-bottom-color: var(--border);
      }
      .club-panel-title.is-closed {
        margin-bottom: 0;
        border-bottom-color: transparent;
      }
      .club-list-wrap:not(.collapsed) .club-list {
        max-height: 260px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <header>
    <div class="logo">
      LM EMULATOR
    </div>
    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-label" id="status-label">READY</span>
    </div>
  </header>

  <div class="main-grid">
    <!-- LEFT: CLUB SELECTOR -->
    <div class="panel" id="club-panel" style="overflow-y:visible;">
      <div class="club-panel-title is-open" id="club-panel-title" onclick="toggleClubPanel()">
        <div style="display:flex;align-items:center;gap:10px;">
          <span>Club Selection</span>
          <div class="club-selected-summary" id="club-summary">
            <span class="csname" id="cs-name">Driver</span>
            <span class="csdist" id="cs-dist"></span>
          </div>
        </div>
        <button class="club-toggle-btn open" id="club-toggle-btn" onclick="event.stopPropagation();toggleClubPanel()">
          <span>COLLAPSE</span>
          <span class="club-toggle-arrow">▲</span>
        </button>
      </div>
      <div class="club-list-wrap" id="club-list-wrap">
        <div class="club-list" id="club-list"></div>
      </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="right-col">

      <!-- METRICS -->
      <div class="panel">
        <div class="club-title" id="v-club">Club Type</div>
        <div class="readout-grid">
          <div class="metric" id="m-carry">
            <div class="metric-label">EST. CARRY</div>
            <div class="metric-value" id="v-carry">--</div>
            <div class="metric-unit">METRES</div>
          </div>
          <div class="metric" id="m-ball-speed">
            <div class="metric-label">BALL SPEED</div>
            <div class="metric-value" id="v-ball-speed">--</div>
            <div class="metric-unit">KM/H</div>
          </div>
          <div class="metric" id="m-spin-rpm">
            <div class="metric-label">SPIN RATE</div>
            <div class="metric-value" id="v-spin-rpm">--</div>
            <div class="metric-unit">RPM (+BACK / −FWD)</div>
          </div>
          <div class="metric" id="m-spin-axis">
            <div class="metric-label">SPIN AXIS</div>
            <div class="metric-value" id="v-spin-axis">--</div>
            <div class="metric-unit">DEG FROM VERTICAL</div>
          </div>
          <div class="metric" id="m-vla">
            <div class="metric-label">VLA</div>
            <div class="metric-value" id="v-vla">--</div>
            <div class="metric-unit">VERT LAUNCH ANGLE °</div>
          </div>
          <div class="metric" id="m-hla">
            <div class="metric-label">HLA</div>
            <div class="metric-value" id="v-hla">--</div>
            <div class="metric-unit">HORZ LAUNCH ANGLE °</div>
          </div>
          <div class="metric" id="m-loft">
            <div class="metric-label">LOFT</div>
            <div class="metric-value" id="v-loft">--</div>
            <div class="metric-unit">DEGREES</div>
          </div>
          <div class="metric" id="m-shot">
            <div class="metric-label">SHOT TYPE</div>
            <div class="metric-value" style="font-size:1rem;" id="v-shot">--</div>
            <div class="metric-unit">SHAPE</div>
          </div>
        </div>
      </div>

      <!-- POWER METER -->
      <div class="panel">
        <div class="panel-title">Power</div>
        <div class="power-wrap">
          <div class="power-label-col">
            <div class="power-pct" id="power-pct">100%</div>
            <div class="power-sublabel">POWER</div>
          </div>
          <div class="power-slider-col">
            <div class="power-track" id="power-track">
              <div class="power-fill" id="power-fill" style="width:100%"></div>
              <div class="power-ticks">
                <div class="power-tick"></div><div class="power-tick"></div>
                <div class="power-tick"></div><div class="power-tick"></div>
                <div class="power-tick"></div><div class="power-tick"></div>
                <div class="power-tick"></div><div class="power-tick"></div>
                <div class="power-tick"></div><div class="power-tick"></div>
                <div class="power-tick"></div>
              </div>
              <input type="range" class="power-range" id="power-range" min="0" max="100" value="100" step="1"/>
            </div>
            <div class="power-notch-labels">
              <span>10%</span><span>25%</span><span>50%</span><span>75%</span><span>100%</span>
            </div>
            <div class="power-presets">
              <button class="power-preset" onclick="setPower(10)">10%</button>
              <button class="power-preset" onclick="setPower(25)">25%</button>
              <button class="power-preset" onclick="setPower(50)">50%</button>
              <button class="power-preset" onclick="setPower(75)">75%</button>
              <button class="power-preset active" onclick="setPower(100)">FULL</button>
            </div>
          </div>
        </div>
      </div>

      <!-- SHOT TYPES -->
      <div class="panel">
        <div class="panel-title">Send Shot</div>
        <div class="shot-grid">
          <button class="shot-btn snap-hook" data-shot="snap_hook"  onclick="sendShot(this)">
            <span class="shot-icon">↰</span>
            <span>SNAP HOOK</span>
          </button>
          <button class="shot-btn draw"      data-shot="draw"       onclick="sendShot(this)">
            <span class="shot-icon">↶</span>
            <span>DRAW</span>
          </button>
          <button class="shot-btn straight"  data-shot="straight"   onclick="sendShot(this)">
            <span class="shot-icon">↑</span>
            <span>STRAIGHT</span>
          </button>
          <button class="shot-btn fade"      data-shot="fade"       onclick="sendShot(this)">
            <span class="shot-icon">↷</span>
            <span>FADE</span>
          </button>
          <button class="shot-btn slice"     data-shot="slice"      onclick="sendShot(this)">
            <span class="shot-icon">↱</span>
            <span>SLICE</span>
          </button>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Activity Log</div>
        <div class="log-wrap" id="log"></div>
      </div>

    </div>
  </div>
</div>

<script>
// ── CLUB DATA ────────────────────────────────────────────────────────────────
const CLUBS = [
  { cat:'Woods',   abv:'DR', name:'Driver',   loft:10.5, vla:10, ball_speed:268, spin_rpm: 2700, spin_axis:0 },
  { cat:'Woods',   abv:'3W', name:'3 Wood',   loft:15,   vla:11, ball_speed:248, spin_rpm: 3500, spin_axis:0 },
  { cat:'Woods',   abv:'5W', name:'5 Wood',   loft:18,   vla:13, ball_speed:235, spin_rpm: 4200, spin_axis:0 },
  { cat:'Hybrids', abv:'3H', name:'3 Hybrid', loft:19,   vla:14, ball_speed:225, spin_rpm: 4500, spin_axis:0 },
  { cat:'Hybrids', abv:'4H', name:'4 Hybrid', loft:22,   vla:16, ball_speed:214, spin_rpm: 5000, spin_axis:0 },
  { cat:'Irons',   abv:'3I', name:'3 Iron',   loft:21,   vla:15, ball_speed:220, spin_rpm: 4800, spin_axis:0 },
  { cat:'Irons',   abv:'4I', name:'4 Iron',   loft:24,   vla:17, ball_speed:209, spin_rpm: 5200, spin_axis:0 },
  { cat:'Irons',   abv:'5I', name:'5 Iron',   loft:27,   vla:19, ball_speed:196, spin_rpm: 5800, spin_axis:0 },
  { cat:'Irons',   abv:'6I', name:'6 Iron',   loft:30,   vla:21, ball_speed:184, spin_rpm: 6400, spin_axis:0 },
  { cat:'Irons',   abv:'7I', name:'7 Iron',   loft:34,   vla:23, ball_speed:169, spin_rpm: 7100, spin_axis:0 },
  { cat:'Irons',   abv:'8I', name:'8 Iron',   loft:38,   vla:26, ball_speed:156, spin_rpm: 7800, spin_axis:0 },
  { cat:'Irons',   abv:'9I', name:'9 Iron',   loft:42,   vla:29, ball_speed:143, spin_rpm: 8500, spin_axis:0 },
  { cat:'Wedges',  abv:'PW', name:'PW',       loft:46,   vla:31, ball_speed:132, spin_rpm: 9200, spin_axis:0 },
  { cat:'Wedges',  abv:'GW', name:'GW (50°)', loft:50,   vla:33, ball_speed:121, spin_rpm: 9800, spin_axis:0 },
  { cat:'Wedges',  abv:'SW', name:'SW (54°)', loft:54,   vla:36, ball_speed:110, spin_rpm:10400, spin_axis:0 },
  { cat:'Wedges',  abv:'LW', name:'LW (60°)', loft:60,   vla:40, ball_speed: 93, spin_rpm:11400, spin_axis:0 },
  { cat:'Putter',  abv:'PT', name:'Putter',   loft:4,    vla: 2, ball_speed: 16, spin_rpm: -400, spin_axis:0 },
];

// Per shot-type modifiers applied to a club's base values:
const SHOT_MODS = {
  straight:  { hla:  0, spin_delta:     0, spin_axis:   0 },
  draw:      { hla: -3, spin_delta:  -400, spin_axis: -15 },
  fade:      { hla: +3, spin_delta:  +400, spin_axis: +15 },
  snap_hook: { hla: -8, spin_delta: -1200, spin_axis: -45 },
  slice:     { hla: +8, spin_delta: +1200, spin_axis: +45 },
};

// ── STATE ────────────────────────────────────────────────────────────────────
let selectedClub = CLUBS[0];
let shotCount = 0;
let currentPower = 100; // percent 10-100
 
// ── POWER SCALING ────────────────────────────────────────────────────────────
//   ball_speed scales linearly with power factor (p)
//   spin_rpm scales with p^1.7 (spin drops faster than speed, like a real partial swing)
//   vla increases slightly at lower power (less shaft lean = more effective loft)
//   vla_delta = (1 - p) * 4  → adds up to 4° at 10% power
function applyPower(club, mods, pct) {
  const p = pct / 100;
  const ball_speed = Math.round(club.ball_speed * p);
  const spin_rpm   = Math.round((club.spin_rpm + mods.spin_delta) * Math.pow(p, 1.7));
  const vla        = +(club.vla + (1 - p) * 4).toFixed(1);
  const hla        = mods.hla;
  const spin_axis  = mods.spin_axis;
  return { ball_speed, spin_rpm, vla, hla, spin_axis };
}
 
function setPower(pct) {
  const pwr = Math.max(10, Math.min(100, pct));
  if (pwr === currentPower) return;

  currentPower = pwr;
  const range = document.getElementById('power-range');
  const fill  = document.getElementById('power-fill');
  const label = document.getElementById('power-pct');
  range.value = currentPower;
  fill.style.width = currentPower + '%';
  label.textContent = currentPower + '%';
  const cls = currentPower <= 30 ? 'low' : currentPower <= 60 ? 'mid' : '';
  label.className = 'power-pct' + (cls ? ' ' + cls : '');
  fill.className  = 'power-fill' + (cls ? ' ' + cls : '');
  // Update preset button active state
  document.querySelectorAll('.power-preset').forEach(b => {
    const v = b.textContent === 'FULL' ? 100 : parseInt(b.textContent);
    b.classList.toggle('active', v === currentPower);
  });
  // Refresh carry estimate for current club
  updateCarryMetric();
}

// ── CARRY DISTANCE ESTIMATE ──────────────────────────────────────────────────
function estimateCarry(club) {
  const v0_ms    = club.ball_speed / 3.6; // km/h > m/s
  const vla_rad  = club.vla * Math.PI / 180;
  const omega    = club.spin_rpm * (2 * Math.PI / 60); // rad/s
  const liftSign = club.spin_rpm >= 0 ? 1 : -1;

  const mass = 0.0459, radius = 0.02135;
  const area = Math.PI * radius * radius;
  const rho = 1.225, g = 9.81, dt = 0.001;

  let x = 0, y = 0;
  let vx = v0_ms * Math.cos(vla_rad);
  let vy = v0_ms * Math.sin(vla_rad);

  for (let i = 0; i < 60000; i++) {
    if (y < 0 && i > 50) break;
    const v = Math.sqrt(vx * vx + vy * vy);
    if (v < 0.01) break;
    const S  = (radius * Math.abs(omega)) / v;
    const Cd = 0.18 + 0.28 * Math.pow(S, 0.5);
    const Cl = 0.280 * Math.pow(S, 0.10);
    const qA = 0.5 * rho * area * v * v;
    const ax = -(Cd * qA / mass) * (vx / v);
    const ay = -(Cd * qA / mass) * (vy / v) - g + (Cl * qA * liftSign / mass);
    vx += ax * dt;  vy += ay * dt;
    x  += vx * dt;  y  += vy * dt;
  }
  return Math.round(x);
}

function updateCarryMetric() {
  if (!selectedClub) return;
  const mods = SHOT_MODS.straight;
  const scaled = applyPower(selectedClub, mods, currentPower);
  const clubForSim = { ...selectedClub, ball_speed: scaled.ball_speed, spin_rpm: scaled.spin_rpm, vla: scaled.vla };
  const carry = estimateCarry(clubForSim);
  updateMetric('v-carry', carry + 'm');
  updateMetric('v-ball-speed', scaled.ball_speed);
  updateMetric('v-vla', scaled.vla.toFixed(1));
  updateMetric('v-spin-rpm', scaled.spin_rpm.toLocaleString());
}

// ── BUILD CLUB LIST ──────────────────────────────────────────────────────────
(function buildClubList() {
  const list = document.getElementById('club-list');
  let lastCat = '';
  CLUBS.forEach((c, i) => {
    if (c.cat !== lastCat) {
      const cat = document.createElement('div');
      cat.className = 'club-category';
      cat.textContent = c.cat;
      list.appendChild(cat);
      lastCat = c.cat;
    }
    const dist = estimateCarry(c);
    const btn = document.createElement('button');
    btn.className = 'club-item' + (i === 0 ? ' active' : '');
    btn.dataset.idx = i;
    btn.innerHTML = `<span>${c.name}</span><span class="club-loft">${dist}m</span>`;
    btn.addEventListener('click', () => selectClub(i));
    list.appendChild(btn);
  });
})();

function selectClub(idx, autoCollapse = true) {
  selectedClub = CLUBS[idx];
  document.querySelectorAll('.club-item').forEach(b => b.classList.remove('active'));
  document.querySelector(`.club-item[data-idx="${idx}"]`).classList.add('active');
  updateMetric('v-club',      selectedClub.name);
  updateMetric('v-loft',      selectedClub.loft.toFixed(1));
  updateMetric('v-spin-axis', '+0');
  updateCarryMetric();
  // Update the collapsed-state summary
  const maxCarry = estimateCarry(selectedClub);
  updateClubSummary(selectedClub, maxCarry);
  log('send', `Club selected: ${selectedClub.name} — loft ${selectedClub.loft}° · ${selectedClub.ball_speed} km/h @ 100% · ${selectedClub.spin_rpm} rpm`);
  // On mobile: auto-collapse after picking a club (not on init)
  if (autoCollapse) {
    const btn = document.getElementById('club-toggle-btn');
    if (btn && getComputedStyle(btn).display !== 'none' && clubPanelOpen) {
      toggleClubPanel();
    }
  }
}

// ── SEND SHOT ────────────────────────────────────────────────────────────────
async function sendShot(btn) {
  const shotType = btn.dataset.shot;
  const mods = SHOT_MODS[shotType] ?? SHOT_MODS.straight;
  const scaled = applyPower(selectedClub, mods, currentPower);

  const { ball_speed, spin_rpm, vla, hla, spin_axis } = scaled;
  
  // Animate button
  btn.classList.add('firing');
  setTimeout(() => btn.classList.remove('firing'), 1000);

  // Update display
  updateMetric('v-vla',        vla.toFixed(1));
  updateMetric('v-hla',        (hla >= 0 ? '+' : '') + hla.toFixed(1));
  updateMetric('v-club',       selectedClub.name);
  updateMetric('v-loft',       selectedClub.loft.toFixed(1));
  updateMetric('v-shot',       shotType.replace('_',' ').toUpperCase());
  updateMetric('v-ball-speed', ball_speed);
  updateMetric('v-spin-rpm',   spin_rpm.toLocaleString());
  updateMetric('v-spin-axis',  (spin_axis >= 0 ? '+' : '') + spin_axis);

  // Set status
  setStatus('SENDING', '#ffc107');
  
  const t0 = performance.now();
  try {
    const res = await fetch('/shot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        shot_num: shotCount,
        club: selectedClub.name,
        loft: selectedClub.loft,
        vla: vla,
        hla: hla,
        shot_type: shotType,
        ball_speed_kmh: ball_speed,
        spin_rpm: spin_rpm,
        spin_axis_deg: spin_axis,
      }),
    });
    const ms = Math.round(performance.now() - t0);
    const body = await res.text();

    if (res.ok) {
      lastPingClub = -1; // reset so sim can send fresh recommended club
      shotCount++;
      setStatus('READY', 'var(--green)');
      log('ok', `HTTP ${res.status} (${ms}ms) — ${body.substring(0,120)}`);
      litMetrics();
    } else {
      setStatus('ERROR', 'var(--red)');
      log('err', `HTTP ${res.status} — ${body.substring(0,120)}`);
    }
  } catch (e) {
    setStatus('OFFLINE', 'var(--red)');
    log('err', `Network error: ${e.message}`);
  }
}

// ── METRICS HELPERS ──────────────────────────────────────────────────────────
function updateMetric(id, val, cls) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val;
  el.classList.add('updating');
  setTimeout(() => el.classList.remove('updating'), 300);
}

function litMetrics() {
  document.querySelectorAll('.metric').forEach(m => {
    m.classList.add('lit');
    setTimeout(() => m.classList.remove('lit'), 600);
  });
}

// ── STATUS ───────────────────────────────────────────────────────────────────
function setStatus(txt, col) {
  const dot = document.getElementById('status-dot');
  const lbl = document.getElementById('status-label');
  lbl.textContent = txt;
  dot.style.background = col;
  dot.style.boxShadow = `0 0 8px ${col}`;
}

// ── LOG ──────────────────────────────────────────────────────────────────────
function log(type, msg) {
  const wrap = document.getElementById('log');
  const now = new Date();
  const ts = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}.${String(now.getMilliseconds()).padStart(3,'0')}`;
  const entry = document.createElement('div');
  entry.className = `log-entry ${type}`;
  entry.innerHTML = `<span class="ts">${ts}</span><span class="msg">${msg}</span>`;
  wrap.appendChild(entry);
  wrap.scrollTop = wrap.scrollHeight;
  // keep max 80 lines
  while (wrap.children.length > 80) wrap.removeChild(wrap.firstChild);
}

// ── PING SERVER FOR STATUS ───────────────────────────────────────────────────
let lastPingStatus = true;
let lastPingClub = -1;
async function ping() {
  try {
    const res = await fetch('/ping', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: '',
    });
    const body = await res.text();
    if (res.ok) {
      setStatus('READY', 'var(--green)');

      if (body != '') {
        const clubIdx = CLUBS.findIndex(c => c.abv === body);
        if (clubIdx > -1 && clubIdx != lastPingClub && selectedClub.abv !== body) {
          selectClub(club);
        }
      }

      if (!lastPingStatus) {
        log('ok', `Connected — ${body.substring(0,120)}`);
      }
    } else {  
      if (lastPingStatus) {
        setStatus('ERROR', 'var(--red)');
        log('err', `HTTP ${res.status} — ${body.substring(0,120)}`);
      }
    }
    lastPingStatus = res.ok;
  } catch (e) {
    if (lastPingStatus) {
      lastPingStatus = false;
      setStatus('OFFLINE', 'var(--red)');
      log('err', `Network error: ${e.message}`);
    }
  }
}

// ── CLUB PANEL TOGGLE ───────────────────────────────────────────────────────
let clubPanelOpen = true;
 
function toggleClubPanel() {
  // Only operates on mobile (toggle button is display:none on desktop)
  const btn = document.getElementById('club-toggle-btn');
  if (getComputedStyle(btn).display === 'none') return;
 
  clubPanelOpen = !clubPanelOpen;
  const wrap  = document.getElementById('club-list-wrap');
  const title = document.getElementById('club-panel-title');
 
  wrap.classList.toggle('collapsed', !clubPanelOpen);
  btn.classList.toggle('open', clubPanelOpen);
 
  if (clubPanelOpen) {
    btn.querySelector('span:first-child').textContent = 'COLLAPSE';
    title.classList.replace('is-closed', 'is-open');
  } else {
    btn.querySelector('span:first-child').textContent = 'EXPAND';
    title.classList.replace('is-open', 'is-closed');
  }
}
 
function updateClubSummary(club, dist) {
  const nameEl = document.getElementById('cs-name');
  const distEl = document.getElementById('cs-dist');
  if (nameEl) nameEl.textContent = club.name;
  if (distEl) distEl.textContent = '~' + dist + 'm';
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.getElementById('power-range').addEventListener('input', function() {
  setPower(parseInt(this.value));
});

log('ok', 'Initialised — select a club and fire a shot');
selectClub(0);
ping();
setInterval(ping, 2000);
